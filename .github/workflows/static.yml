name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"] # If your default branch is named 'master', change this to 'master'

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Install dependencies
        run: npm install
      - name: Build
        run: npm run build
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # THIS IS THE MAGIC LINE! It tells GitHub to upload the finished build, not the raw code.
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
